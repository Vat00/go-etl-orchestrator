services:
  postgres:
    image: postgres:15
    container_name: orchestrator-postgres
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orchestrator-net

  redis:
    image: redis:7-alpine
    container_name: orchestrator-redis
    ports:
      - "6379:6379"
    networks:
      - orchestrator-net

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: orchestrator-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: orchestrator
      REDIS_ADDR: redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - orchestrator-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: orchestrator
      REDIS_ADDR: redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - orchestrator-net
    restart: unless-stopped
    # Можно запустить несколько экземпляров через docker-compose up --scale worker=3

networks:
  orchestrator-net:
    driver: bridge

volumes:
  postgres_data: